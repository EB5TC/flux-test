apiVersion: v1
kind: Namespace
metadata:
  name: paco
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: paco
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: nginx
        image: nginx:latest
